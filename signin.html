<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Umbuzo</title>
    <link rel="icon" type="image/png" href="Mbuzo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .auth-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
        }
        .auth-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        .auth-form {
            text-align: left;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--text-secondary);
        }
        .form-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
        }
        .form-link:hover {
            color: var(--text-primary);
        }
        .auth-footer {
            margin-top: 24px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <img src="Mbuzo.png" alt="Umbuzo" class="auth-logo">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue to Umbuzo</p>

            <form class="auth-form" id="signinForm" onsubmit="handleSignIn(event)">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" required autocomplete="current-password">
                </div>

                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="remember">
                        <span style="font-size: 14px;">Remember me</span>
                    </label>
                    <a href="#" class="form-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 8px;">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html" class="form-link">Sign Up</a>
            </div>
        </div>
    </div>

    <script>
        function handleSignIn(event) {
            event.preventDefault();
            alert('Sign in functionality is not yet implemented. Redirecting to home page.');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
