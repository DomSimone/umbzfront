<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbuzo - Chat History</title>
    <link rel="icon" type="image/png" href="Mbuzo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="nav-logo-link">
                    <img src="Mbuzo.png" alt="Umbuzo Logo" class="nav-logo">
                    <span class="nav-brand">Umbuzo</span>
                </a>
            </div>
            <div class="nav-center">
                <a href="index.html" class="nav-link">Chat</a>
                <a href="history.html" class="nav-link active">History</a>
                <a href="apps.html" class="nav-link">Apps</a>
                <a href="monitor.html" class="nav-link">Monitor</a>
                <a href="http://127.0.0.1:8001/docs" class="nav-link" target="_blank">API Docs</a>
            </div>
            <div class="nav-right">
                <button class="btn-signin" onclick="window.location.href='signin.html'">Sign In</button>
                <button class="btn-signup" onclick="window.location.href='signup.html'">Sign Up</button>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="container-info">
            <div class="model-info">
                <span>🧠 Umbuzo Model</span>
                <span class="model-tag">GGUF</span>
            </div>
        </div>

        <button class="btn-new-chat" onclick="window.location.href='index.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span>New Chat</span>
        </button>

        <div class="sidebar-footer">
            <a href="monitor.html" class="sidebar-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 12h4l2 4 4-8 4 6h4"></path>
                </svg>
                <span>System Monitor</span>
            </a>
            <a href="apps.html" class="sidebar-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span>Apps & Tools</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="history-main">
            <div class="history-container">
                <div class="history-header">
                    <h1>Chat History</h1>
                    <button class="btn-clear-history" id="btnClearHistory">Clear History</button>
                </div>

                <div class="history-filters">
                    <input type="text" class="search-input" id="historySearchInput" placeholder="Search conversations..." onkeyup="filterHistory()">
                    <select class="filter-select" id="historyFilterSelect" onchange="filterHistory()">
                        <option value="all">All Topics</option>
                        <option value="default">General Inquiry</option>
                        <option value="Political And Civic Engagement">Political & Civic</option>
                        <option value="Economic And Labor Trends">Economic & Labor</option>
                        <option value="Urban and community dynamics">Urban & Community</option>
                        <option value="Demographic Trends">Demographics</option>
                    </select>
                </div>

                <div class="history-list" id="fullHistoryList">
                    <!-- Dynamically populated -->
                    <div class="empty-state" id="historyEmptyState">
                        <h2>No History Yet</h2>
                        <p>Start a conversation with Umbuzo to see it here.</p>
                        <button class="btn-primary" onclick="window.location.href='index.html'">Start Chat</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script> <!-- Load app.js for shared functions -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderFullHistory();
            document.getElementById('btnClearHistory')?.addEventListener('click', clearHistory);
        });

        function renderFullHistory() {
            const list = document.getElementById('fullHistoryList');
            const emptyState = document.getElementById('historyEmptyState');
            const history = JSON.parse(localStorage.getItem('umbuzo_history') || '[]');

            list.innerHTML = ''; // Clear existing list
            if (history.length === 0) {
                if (emptyState) emptyState.style.display = 'block';
                return;
            } else {
                if (emptyState) emptyState.style.display = 'none';
            }

            history.forEach(chat => {
                const item = document.createElement('div');
                item.className = 'history-item-card';
                item.innerHTML = `
                    <div class="history-item-title">${chat.title}</div>
                    <div class="history-item-preview">Topic: ${chat.mode || 'General'}</div>
                    <div class="history-item-meta">
                        <span>${new Date(chat.timestamp).toLocaleString()}</span>
                    </div>
                `;
                item.onclick = () => {
                    localStorage.setItem('umbuzo_load_chat_id', chat.id); // Set flag
                    window.location.href = 'index.html'; // Navigate to main chat
                };
                list.appendChild(item);
            });
            filterHistory(); // Apply filters after rendering
        }

        function clearHistory() {
            if(confirm('Are you sure you want to clear all chat history? This cannot be undone.')) {
                localStorage.removeItem('umbuzo_history');
                renderFullHistory(); // Re-render to show empty state
            }
        }

        function filterHistory() {
            const searchInput = document.getElementById('historySearchInput');
            const filterSelect = document.getElementById('historyFilterSelect');
            const searchTerm = searchInput?.value.toLowerCase() || '';
            const selectedTopic = filterSelect?.value || 'all';

            const historyItems = document.querySelectorAll('.history-item-card');
            const history = JSON.parse(localStorage.getItem('umbuzo_history') || '[]');

            let visibleCount = 0;
            historyItems.forEach((item, index) => {
                const chat = history[index]; // Get original chat object
                const title = chat.title.toLowerCase();
                const mode = chat.mode?.toLowerCase() || 'default';

                const matchesSearch = title.includes(searchTerm);
                const matchesTopic = (selectedTopic === 'all' || mode === selectedTopic.toLowerCase());

                if (matchesSearch && matchesTopic) {
                    item.style.display = 'block';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });

            // Show empty state if no items match filters
            const emptyState = document.getElementById('historyEmptyState');
            if (emptyState) {
                emptyState.style.display = (visibleCount === 0 && history.length > 0) ? 'block' : 'none';
                if (history.length === 0) emptyState.style.display = 'block'; // Always show if no history at all
            }
        }
    </script>
</body>
</html>
