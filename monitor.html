<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbuzo - System Monitor</title>
    <link rel="icon" type="image/png" href="Mbuzo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .monitor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .monitor-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .monitor-card h3 {
            margin-bottom: 15px;
            font-size: 16px;
            color: var(--text-secondary);
        }
        .status-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-ok { background-color: #4CAF50; }
        .status-warn { background-color: #ff9800; }
        .status-err { background-color: #f44336; }
    </style>
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="nav-logo-link">
                    <img src="Mbuzo.png" alt="Umbuzo Logo" class="nav-logo">
                    <span class="nav-brand">Umbuzo</span>
                </a>
            </div>
            <div class="nav-center">
                <a href="index.html" class="nav-link">Chat</a>
                <a href="history.html" class="nav-link">History</a>
                <a href="apps.html" class="nav-link">Apps</a>
                <a href="monitor.html" class="nav-link active">Monitor</a>
                <a href="http://127.0.0.1:8001/docs" class="nav-link" target="_blank">API Docs</a>
            </div>
            <div class="nav-right">
                <button class="btn-signin" onclick="window.location.href='signin.html'">Sign In</button>
                <button class="btn-signup" onclick="window.location.href='signup.html'">Sign Up</button>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="container-info">
            <div class="model-info">
                <span>🧠 Umbuzo Model</span>
                <span class="model-tag">GGUF</span>
            </div>
        </div>

        <button class="btn-new-chat" onclick="window.location.href='index.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span>New Chat</span>
        </button>

        <div class="sidebar-footer">
            <a href="monitor.html" class="sidebar-link active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 12h4l2 4 4-8 4 6h4"></path>
                </svg>
                <span>System Monitor</span>
            </a>
            <a href="apps.html" class="sidebar-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span>Apps & Tools</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="history-main"> <!-- Reusing history layout for padding -->
            <div class="history-container">
                <div class="history-header">
                    <h1>System Monitor</h1>
                    <button class="btn-clear-history" onclick="checkHealth()">Refresh Status</button>
                </div>

                <div class="monitor-grid">
                    <div class="monitor-card">
                        <h3>Backend Status</h3>
                        <div id="backendStatus">
                            <span class="status-indicator status-warn"></span>
                            <span class="status-value">Checking...</span>
                        </div>
                    </div>
                    <div class="monitor-card">
                        <h3>Model Path</h3>
                        <div id="modelPath" style="font-family: monospace; font-size: 14px; word-break: break-all;">
                            --
                        </div>
                    </div>
                    <div class="monitor-card">
                        <h3>API Endpoint</h3>
                        <div style="font-family: monospace; font-size: 14px;">
                            http://127.0.0.1:8001
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const API_BASE_URL = 'http://127.0.0.1:8001';

        async function checkHealth() {
            const statusEl = document.getElementById('backendStatus');
            const pathEl = document.getElementById('modelPath');
            
            statusEl.innerHTML = '<span class="status-indicator status-warn"></span><span class="status-value">Pinging...</span>';

            try {
                const resp = await axios.get(`${API_BASE_URL}/health`);
                if (resp.data.status === 'healthy') {
                    statusEl.innerHTML = '<span class="status-indicator status-ok"></span><span class="status-value">Online</span>';
                } else {
                    statusEl.innerHTML = '<span class="status-indicator status-warn"></span><span class="status-value">Loading Model</span>';
                }
                pathEl.textContent = resp.data.model_path || 'Unknown';
            } catch (e) {
                console.error(e);
                statusEl.innerHTML = '<span class="status-indicator status-err"></span><span class="status-value">Offline</span>';
                pathEl.textContent = 'N/A';
            }
        }

        document.addEventListener('DOMContentLoaded', checkHealth);
    </script>
</body>
</html>
